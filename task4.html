<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 4</title>
</head>
<body>

    <h1>Fill in your information</h1>

    <form>
        <fieldset>
            <legend>Form</legend>

            <label>First name:</label><br>
            <input type="text"><br>

            <label>Last name:</label><br>
            <input type="text"><br>

            <label>Email:</label><br>
            <input type="email"><br><br>

            <h4>Your Gender</h4>
            <input type="radio" name="gender" value="male">
            <label>Male</label>

            <input type="radio" name="gender" value="female">
            <label>Female</label>

            <h4>Favorite Subjects</h4>
            <input type="checkbox" value="C++">
            <label>C++</label>

            <input type="checkbox" value="Java">
            <label>Java</label>

            <input type="checkbox" value="C#">
            <label>C#</label>

            <input type="checkbox" value="PHP">
            <label>PHP</label>

            <input type="checkbox" value="SQL">
            <label>SQL</label>

            <h4>Your City</h4>
            <label>City:</label>
            <select>
                <option>Irbid</option>
                <option>Amman</option>
                <option>Zarqa</option>
                <option>Aqaba</option>
            </select>

            <br><br>

            <label>Upload Image:</label>
            <input type="file">

            <br><br>

            <label>Write About yourself:</label><br><br>
            <textarea rows="5" cols="40" placeholder="Write Here"></textarea>

            <br>

            <input type="submit" value="Submit">
        </fieldset>
    </form>

</body>
</html>
